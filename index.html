<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Search API Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .container {
      width: 100%;
      max-width: 760px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }
    .subtitle code {
      background: #1e1e1e;
      padding: 1px 6px;
      border-radius: 4px;
      color: #a8d8a8;
      font-size: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #4a9eff;
    }
    input[type="password"] {
      font-family: monospace;
      letter-spacing: 0.1em;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .field { margin-bottom: 20px; }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .row .field { flex: 1; margin-bottom: 0; }
    button {
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
    }
    button:hover { background: #3a8eef; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-box {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 20px;
      margin-top: 8px;
      display: none;
    }
    .result-box.visible { display: block; }
    .result-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .citations {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #2e2e2e;
    }
    .citations-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 10px;
    }
    .citation-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .citation-num {
      font-size: 11px;
      color: #4a9eff;
      background: #1e2d3d;
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .citation-link {
      font-size: 13px;
      color: #4a9eff;
      text-decoration: none;
      word-break: break-all;
    }
    .citation-link:hover { text-decoration: underline; }
    .citation-title {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .error-box {
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 8px;
      padding: 14px 18px;
      color: #ff7070;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .error-box.visible { display: block; }
    .status {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
      min-height: 18px;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #2e2e2e;
      padding-bottom: 0;
    }
    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: #666;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover { background: none; color: #aaa; }
    .tab.active { color: #4a9eff; border-bottom-color: #4a9eff; }
    .tab:disabled { opacity: 0.5; cursor: not-allowed; }
    .model-badge {
      display: inline-block;
      background: #1e2d1e;
      color: #6dbf6d;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .request-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px;
      margin-top: 24px;
      display: none;
    }
    .request-box.visible { display: block; }
    .request-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444;
      margin-bottom: 8px;
    }
    .request-body {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #888;
      white-space: pre;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Search API Demo</h1>
    <p class="subtitle">OpenAI <code>web_search</code> vs Anthropic <code>web_search / web_fetch</code> built-in tools · <a href="https://api.gpt.ge/register?aff=CXrK" target="_blank" style="color:#4a9eff;text-decoration:none;">api.gpt.ge 注册</a></p>

    <div class="row" style="margin-bottom:24px">
      <div class="field">
        <label>API Base URL</label>
        <input type="text" id="baseUrl" value="https://api.gpt.ge" placeholder="https://api.gpt.ge">
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-openai" onclick="switchTab('openai')">OpenAI <span class="model-badge" style="margin-left:6px">gpt-5-nano</span></button>
      <button class="tab" id="tab-claude" onclick="switchTab('claude')">Claude <span class="model-badge" style="margin-left:6px;background:#1e2d3d;color:#7ab8f5">claude-haiku-4-5-20251001</span></button>
      <button class="tab" id="tab-openai-mcp" onclick="switchTab('openai-mcp')">MCP <span class="model-badge" style="margin-left:6px;background:#2d2a1e;color:#d8c77a">gpt-5-nano</span></button>
    </div>

    <!-- OpenAI panel -->
    <div id="panel-openai">
      <div class="field">
        <label>搜索问题</label>
        <textarea id="query" placeholder="例如：今天有什么科技新闻？"></textarea>
      </div>
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:8px;">
        <button id="searchBtn" onclick="doSearch()">搜索</button>
        <div class="status" id="status"></div>
      </div>
      <div class="error-box" id="errorBox"></div>
      <div class="result-box" id="resultBox">
        <div class="result-text" id="resultText"></div>
        <div class="citations" id="citations" style="display:none">
          <div class="citations-title">来源</div>
          <div id="citationList"></div>
        </div>
      </div>
      <div class="request-box" id="requestBox">
        <div class="request-title">Request Body</div>
        <div class="request-body" id="requestBody"></div>
      </div>
      <div class="request-box" id="responseBox">
        <div class="request-title">Response Body</div>
        <div class="request-body" id="responseBody"></div>
      </div>
    </div>

    <!-- Claude panel -->
    <div id="panel-claude" style="display:none">
      <div class="field">
        <label>搜索问题</label>
        <textarea id="claudeQuery" placeholder="例如：今天有什么科技新闻？"></textarea>
      </div>
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:8px;">
        <button id="claudeSearchBtn" onclick="doClaudeSearch()">搜索</button>
        <div class="status" id="claudeStatus"></div>
      </div>
      <div class="error-box" id="claudeErrorBox"></div>
      <div class="result-box" id="claudeResultBox">
        <div class="result-text" id="claudeResultText"></div>
        <div class="citations" id="claudeCitations" style="display:none">
          <div class="citations-title">来源</div>
          <div id="claudeCitationList"></div>
        </div>
      </div>
      <div class="request-box" id="claudeRequestBox">
        <div class="request-title">Request Body</div>
        <div class="request-body" id="claudeRequestBody"></div>
      </div>
      <div class="request-box" id="claudeResponseBox">
        <div class="request-title">Response Body</div>
        <div class="request-body" id="claudeResponseBody"></div>
      </div>
    </div>

    <!-- OpenAI MCP panel -->
    <div id="panel-openai-mcp" style="display:none">
      <div class="field">
        <label>搜索问题</label>
        <textarea id="mcpQuery" placeholder="例如：今天有什么科技新闻？"></textarea>
      </div>
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:8px;">
        <button id="mcpSearchBtn" onclick="doOpenAIMcpSearch()">搜索</button>
        <div class="status" id="mcpStatus"></div>
      </div>
      <div class="error-box" id="mcpErrorBox"></div>
      <div class="result-box" id="mcpResultBox">
        <div class="result-text" id="mcpResultText"></div>
        <div class="citations" id="mcpCitations" style="display:none">
          <div class="citations-title">来源</div>
          <div id="mcpCitationList"></div>
        </div>
      </div>
      <div class="request-box" id="mcpRequestBox">
        <div class="request-title">Request Body</div>
        <div class="request-body" id="mcpRequestBody"></div>
      </div>
      <div class="request-box" id="mcpResponseBox">
        <div class="request-title">Response Body</div>
        <div class="request-body" id="mcpResponseBody"></div>
      </div>
    </div>
  </div>

  <script>
    const MCP_ENDPOINT = 'https://orz.xiaogenban.deno.net/mcp';
    let cachedMcpTools = null;

    function switchTab(tab) {
      document.getElementById('panel-openai').style.display = tab === 'openai' ? '' : 'none';
      document.getElementById('panel-openai-mcp').style.display = tab === 'openai-mcp' ? '' : 'none';
      document.getElementById('panel-claude').style.display = tab === 'claude' ? '' : 'none';
      document.getElementById('tab-openai').className = 'tab' + (tab === 'openai' ? ' active' : '');
      document.getElementById('tab-openai-mcp').className = 'tab' + (tab === 'openai-mcp' ? ' active' : '');
      document.getElementById('tab-claude').className = 'tab' + (tab === 'claude' ? ' active' : '');
    }

    function safeJsonParse(value, fallback) {
      if (typeof value !== 'string') return fallback;
      try { return JSON.parse(value); } catch { return fallback; }
    }

    function safeStringify(value) {
      try { return JSON.stringify(value); } catch { return String(value); }
    }

    function addCitation(citations, seen, url, title) {
      if (url && !seen.has(url)) {
        seen.add(url);
        citations.push({ url, title: title || url });
      }
    }

    function collectResponseCitations(resp, citations, seen) {
      for (const item of (resp.output || [])) {
        if (item.type !== 'message') continue;
        for (const c of (item.content || [])) {
          if (c.type !== 'output_text') continue;
          for (const ann of (c.annotations || [])) {
            if (ann.type === 'url_citation') {
              addCitation(citations, seen, ann.url, ann.title || ann.url);
            }
          }
        }
      }
    }

    function extractResponseText(resp) {
      if (typeof resp.output_text === 'string' && resp.output_text.trim()) {
        return resp.output_text.trim();
      }
      let text = '';
      for (const item of (resp.output || [])) {
        if (item.type !== 'message') continue;
        for (const c of (item.content || [])) {
          if (c.type === 'output_text' && c.text) text += c.text;
        }
      }
      return text.trim();
    }

    function renderCitations(citations, citationList, citationsEl) {
      if (citations.length === 0) {
        citationsEl.style.display = 'none';
        return;
      }
      citationList.innerHTML = citations.map((c, i) => `
        <div class="citation-item">
          <span class="citation-num">${i + 1}</span>
          <div>
            <a class="citation-link" href="${c.url}" target="_blank">${c.url}</a>
            <div class="citation-title">${c.title}</div>
          </div>
        </div>
      `).join('');
      citationsEl.style.display = 'block';
    }

    function renderMcpOutput(resultEl, toolLogs, answerText) {
      const lines = [];
      if (toolLogs.length > 0) {
        lines.push('[工具调用记录]');
        toolLogs.forEach((log, i) => {
          lines.push(`${i + 1}. ${log.name} ${safeStringify(log.args)}`);
        });
        lines.push('');
      }
      lines.push('[模型回复]');
      lines.push(answerText || '（模型未返回文本）');
      resultEl.textContent = lines.join('\n');
    }

    function parseMcpPayloads(raw) {
      const text = (raw || '').trim();
      if (!text) return [];

      if (text[0] === '{' || text[0] === '[') {
        try {
          const parsed = JSON.parse(text);
          return Array.isArray(parsed) ? parsed : [parsed];
        } catch {}
      }

      const payloads = [];
      const blocks = text.split(/\r?\n\r?\n/);
      for (const block of blocks) {
        const dataLines = [];
        for (const line of block.split(/\r?\n/)) {
          if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
        }
        if (dataLines.length === 0) continue;
        const joined = dataLines.join('\n').trim();
        if (!joined || joined === '[DONE]') continue;
        try { payloads.push(JSON.parse(joined)); } catch {}
      }
      if (payloads.length > 0) return payloads;

      const lines = text.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const body = line.slice(5).trim();
        if (!body || body === '[DONE]') continue;
        try { payloads.push(JSON.parse(body)); } catch {}
      }
      return payloads;
    }

    async function mcpJsonRpc(method, params) {
      const body = {
        jsonrpc: '2.0',
        id: `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        method,
        params: params || {}
      };

      const res = await fetch(MCP_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/event-stream'
        },
        body: JSON.stringify(body)
      });

      const raw = await res.text();
      const payloads = parseMcpPayloads(raw);
      const payload = [...payloads].reverse().find(p => p && (Object.prototype.hasOwnProperty.call(p, 'result') || Object.prototype.hasOwnProperty.call(p, 'error')))
        || payloads[payloads.length - 1]
        || null;

      if (!res.ok) {
        throw new Error(payload?.error?.message || `MCP HTTP ${res.status}`);
      }
      if (!payload) throw new Error('MCP 返回格式无法解析');
      if (payload.error) throw new Error(payload.error.message || 'MCP 调用失败');
      if (!Object.prototype.hasOwnProperty.call(payload, 'result')) {
        throw new Error('MCP 调用返回为空');
      }
      return payload.result;
    }

    async function callResponsesApiStream(baseUrl, apiKey, body, onEvent) {
      const res = await fetch(`${baseUrl}/v1/responses`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(apiKey ? { 'Authorization': `Bearer ${apiKey}` } : {})
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const reader = res.body?.getReader?.();
      if (!reader) {
        throw new Error('流式响应不可用');
      }

      const decoder = new TextDecoder();
      let buffer = '';
      let completedResponse = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw || raw === '[DONE]') continue;

          let evt;
          try { evt = JSON.parse(raw); } catch { continue; }
          if (onEvent) onEvent(evt);

          if (evt.type === 'response.completed') {
            completedResponse = evt.response || completedResponse;
          } else if (evt.type === 'response.failed') {
            throw new Error(evt.response?.error?.message || '响应失败');
          }
        }
      }

      if (!completedResponse) {
        throw new Error('流式响应未返回 response.completed');
      }
      return completedResponse;
    }

    function getDefaultMcpTools() {
      return {
        web_search: {
          description: 'Search the web using multiple search engines (Brave, Sogou, DuckDuckGo) simultaneously. Results are deduplicated and ads are filtered out.',
          inputSchema: {
            type: 'object',
            properties: {
              query: { type: 'string', description: 'Search keywords separated by spaces.' },
              num_results: { type: 'number', description: 'Number of results to return (default: 8)', default: 8 }
            },
            required: ['query']
          }
        },
        web_fetch: {
          description: 'Fetch a web page and return its content. simplify=true will extract main content and convert it to Markdown.',
          inputSchema: {
            type: 'object',
            properties: {
              url: { type: 'string', description: 'The URL to fetch' },
              max_char_size: { type: 'number', description: 'Maximum character size (default: 50000)', default: 50000 },
              simplify: { type: 'boolean', description: 'Whether to simplify page content (default: true)', default: true }
            },
            required: ['url']
          }
        }
      };
    }

    async function getMcpTools() {
      if (cachedMcpTools) return cachedMcpTools;
      try {
        const result = await mcpJsonRpc('tools/list', {});
        const map = {};
        for (const tool of (result.tools || [])) map[tool.name] = tool;
        if (map.web_search && map.web_fetch) {
          cachedMcpTools = map;
          return cachedMcpTools;
        }
      } catch (err) {
        console.warn('MCP tools/list failed, fallback to default tool schema:', err);
      }
      cachedMcpTools = getDefaultMcpTools();
      return cachedMcpTools;
    }

    function buildOpenAIMcpTools(toolMap) {
      const defaults = getDefaultMcpTools();
      const search = toolMap.web_search || defaults.web_search;
      const fetchTool = toolMap.web_fetch || defaults.web_fetch;
      return [
        {
          type: 'function',
          name: 'mcp_org_web_search',
          description: search.description,
          parameters: search.inputSchema
        },
        {
          type: 'function',
          name: 'mcp_org_web_fetch',
          description: fetchTool.description,
          parameters: fetchTool.inputSchema
        }
      ];
    }

    function parseToolArgs(args) {
      if (!args) return {};
      if (typeof args === 'string') return safeJsonParse(args, { raw: args });
      if (typeof args === 'object') return args;
      return {};
    }

    function normalizeMcpToolArgs(aliasName, args) {
      const source = (args && typeof args === 'object') ? args : {};

      if (aliasName === 'mcp_org_web_search') {
        const query =
          (typeof source.query === 'string' && source.query.trim()) ||
          (typeof source.q === 'string' && source.q.trim()) ||
          (Array.isArray(source.queries) ? String(source.queries.find(v => typeof v === 'string' && v.trim()) || '').trim() : '') ||
          (typeof source.keyword === 'string' && source.keyword.trim()) ||
          '';

        if (!query) throw new Error('mcp_org_web_search 缺少 query 参数');

        const normalized = { query };
        const numResults = Number(source.num_results ?? source.max_results ?? source.top_k);
        if (Number.isFinite(numResults) && numResults > 0) {
          normalized.num_results = Math.min(20, Math.floor(numResults));
        }
        return normalized;
      }

      if (aliasName === 'mcp_org_web_fetch') {
        const url =
          (typeof source.url === 'string' && source.url.trim()) ||
          (typeof source.link === 'string' && source.link.trim()) ||
          (typeof source.uri === 'string' && source.uri.trim()) ||
          '';

        if (!url) throw new Error('mcp_org_web_fetch 缺少 url 参数');

        const normalized = { url };
        const maxCharSize = Number(source.max_char_size ?? source.max_chars ?? source.max_length);
        if (Number.isFinite(maxCharSize) && maxCharSize > 0) {
          normalized.max_char_size = Math.floor(maxCharSize);
        }
        if (typeof source.simplify === 'boolean') {
          normalized.simplify = source.simplify;
        }
        return normalized;
      }

      return source;
    }

    async function callMcpToolByAlias(aliasName, args) {
      const mcpToolName = aliasName === 'mcp_org_web_search'
        ? 'web_search'
        : aliasName === 'mcp_org_web_fetch'
          ? 'web_fetch'
          : '';

      if (!mcpToolName) {
        throw new Error(`未知工具: ${aliasName}`);
      }

      return mcpJsonRpc('tools/call', {
        name: mcpToolName,
        arguments: args || {}
      });
    }

    function collectCitationsFromMcpSearch(result, citations, seen) {
      for (const block of (result.content || [])) {
        if (block.type !== 'text' || !block.text) continue;
        const rows = safeJsonParse(block.text, []);
        if (!Array.isArray(rows)) continue;
        for (const row of rows) {
          addCitation(citations, seen, row.url || row.link, row.title || row.url || row.link);
        }
      }
    }

    function getMessageItemsFromResponse(outputItems) {
      const items = [];
      for (const item of (outputItems || [])) {
        if (!item || typeof item !== 'object') continue;
        if (item.type !== 'message') continue;
        items.push({
          type: 'message',
          role: item.role || 'assistant',
          content: item.content || []
        });
      }
      return items;
    }

    async function doOpenAIMcpSearch() {
      const query = document.getElementById('mcpQuery').value.trim();
      const btn = document.getElementById('mcpSearchBtn');
      const status = document.getElementById('mcpStatus');
      const errorBox = document.getElementById('mcpErrorBox');
      const resultBox = document.getElementById('mcpResultBox');
      const requestBox = document.getElementById('mcpRequestBox');
      const responseBox = document.getElementById('mcpResponseBox');
      const resultText = document.getElementById('mcpResultText');
      const citationsEl = document.getElementById('mcpCitations');
      const citationList = document.getElementById('mcpCitationList');

      if (!query) { showMcpError('请输入搜索问题'); return; }

      const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const apiKey = document.getElementById('apiKey').value.trim();

      errorBox.className = 'error-box';
      resultBox.className = 'result-box';
      requestBox.className = 'request-box';
      responseBox.className = 'request-box';
      resultText.textContent = '';
      citationsEl.style.display = 'none';
      citationList.innerHTML = '';

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span>连接中...';

      let finalModel = 'gpt-5-nano';
      let finalAnswer = '';
      const requestHistory = [];
      const responseHistory = [];
      const toolLogs = [];
      const citations = [];
      const seenCitations = new Set();

      try {
        const toolMap = await getMcpTools();
        const openAITools = buildOpenAIMcpTools(toolMap);
        let inputPayload = [{ role: 'user', content: query }];
        const maxRounds = 8;

        resultBox.className = 'result-box visible';

        for (let round = 1; round <= maxRounds; round++) {
          const body = {
            model: 'gpt-5-nano',
            tools: openAITools,
            stream: true,
            input: inputPayload
          };

          requestHistory.push({ round, body });
          document.getElementById('mcpRequestBody').textContent = JSON.stringify(requestHistory, null, 2);
          requestBox.className = 'request-box visible';

          status.innerHTML = `<span class="spinner"></span>第${round}轮处理中...`;
          let sawTextDeltaThisRound = false;

          const resp = await callResponsesApiStream(baseUrl, apiKey, body, evt => {
            const type = evt.type || '';
            if (type === 'response.output_item.added') {
              const item = evt.item || {};
              if (item.type === 'function_call') {
                status.innerHTML = `<span class="spinner"></span>第${round}轮等待工具...`;
              } else if (item.type === 'message') {
                status.innerHTML = `<span class="spinner"></span>第${round}轮生成回答中...`;
              }
            } else if (type === 'response.output_text.delta') {
              sawTextDeltaThisRound = true;
              finalAnswer += evt.delta || '';
              renderMcpOutput(resultText, toolLogs, finalAnswer);
            }
          });
          responseHistory.push({ round, response: resp });
          document.getElementById('mcpResponseBody').textContent = JSON.stringify(responseHistory, null, 2);
          responseBox.className = 'request-box visible';

          finalModel = resp.model || finalModel;

          collectResponseCitations(resp, citations, seenCitations);
          const text = extractResponseText(resp);
          if (text && !sawTextDeltaThisRound) {
            finalAnswer = text;
            renderMcpOutput(resultText, toolLogs, finalAnswer);
          }

          const messageItems = getMessageItemsFromResponse(resp.output);
          if (messageItems.length > 0) {
            inputPayload = inputPayload.concat(messageItems);
          }

          const functionCalls = (resp.output || []).filter(item => item.type === 'function_call');
          if (functionCalls.length === 0) break;

          const toolOutputs = [];
          const preparedCalls = functionCalls.map((call, idx) => {
            const toolName = call.name || '';
            const args = normalizeMcpToolArgs(toolName, parseToolArgs(call.arguments));
            const callId = call.call_id || `call_${round}_${idx}`;
            const argumentsText = typeof call.arguments === 'string' ? call.arguments : safeStringify(args);
            toolLogs.push({ name: toolName, args });
            return { toolName, args, callId, argumentsText };
          });
          renderMcpOutput(resultText, toolLogs, finalAnswer);

          status.innerHTML = `<span class="spinner"></span>第${round}轮并行调用 ${preparedCalls.length} 个工具...`;

          const callResults = await Promise.all(preparedCalls.map(async entry => {
            const mcpResult = await callMcpToolByAlias(entry.toolName, entry.args);
            return { ...entry, mcpResult };
          }));

          for (const entry of callResults) {
            if (entry.toolName === 'mcp_org_web_search') {
              collectCitationsFromMcpSearch(entry.mcpResult, citations, seenCitations);
            } else if (entry.toolName === 'mcp_org_web_fetch') {
              addCitation(citations, seenCitations, entry.args.url, entry.args.url);
            }

            toolOutputs.push({
              type: 'function_call',
              call_id: entry.callId,
              name: entry.toolName,
              arguments: entry.argumentsText,
              status: 'completed'
            });
            toolOutputs.push({
              type: 'function_call_output',
              call_id: entry.callId,
              output: safeStringify(entry.mcpResult)
            });
          }
          if (round === maxRounds) throw new Error('工具调用轮次超过上限，请缩小问题后重试');
          inputPayload = inputPayload.concat(toolOutputs);
        }
        renderMcpOutput(resultText, toolLogs, finalAnswer);

        renderCitations(citations, citationList, citationsEl);
        status.textContent = `完成 · 模型: ${finalModel}`;

      } catch (err) {
        showMcpError(err.message);
        status.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }

    function showMcpError(msg) {
      const box = document.getElementById('mcpErrorBox');
      box.textContent = msg;
      box.className = 'error-box visible';
    }

    async function doClaudeSearch() {
      const query = document.getElementById('claudeQuery').value.trim();
      const btn = document.getElementById('claudeSearchBtn');
      const status = document.getElementById('claudeStatus');
      const errorBox = document.getElementById('claudeErrorBox');
      const resultBox = document.getElementById('claudeResultBox');
      const requestBox = document.getElementById('claudeRequestBox');
      const resultText = document.getElementById('claudeResultText');
      const citationsEl = document.getElementById('claudeCitations');
      const citationList = document.getElementById('claudeCitationList');

      if (!query) { showClaudeError('请输入搜索问题'); return; }

      const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const apiKey = document.getElementById('apiKey').value.trim();

      errorBox.className = 'error-box';
      resultBox.className = 'result-box';
      requestBox.className = 'request-box';
      resultText.textContent = '';
      citationsEl.style.display = 'none';
      citationList.innerHTML = '';

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span>连接中...';

      const tools = [
        { type: 'web_search_20250305', name: 'web_search' },
        { type: 'web_fetch_20250910', name: 'web_fetch' }
      ];
      let finalModel = 'claude-haiku-4-5-20251001';

      try {
        resultBox.className = 'result-box visible';

        const body = {
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2048,
          stream: true,
          tools,
          messages: [{ role: 'user', content: query }]
        };

        document.getElementById('claudeRequestBody').textContent = JSON.stringify(body, null, 2);
        requestBox.className = 'request-box visible';

        status.innerHTML = '<span class="spinner"></span>连接中...';

        const res = await fetch(`${baseUrl}/v1/messages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(apiKey ? { 'x-api-key': apiKey } : {}),
            'anthropic-version': '2023-06-01',
            'anthropic-beta': 'claude-code-20250219,interleaved-thinking-2025-05-14,prompt-caching-scope-2026-01-05'
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        const citations = [];
        const seen = new Set();
        const allEvents = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            let evt;
            try { evt = JSON.parse(raw); } catch { continue; }
            allEvents.push(evt);

            const type = evt.type || '';

            if (type === 'message_start') {
              finalModel = evt.message?.model || finalModel;
            }

            if (type === 'content_block_start') {
              const block = evt.content_block || {};
              if (block.type === 'server_tool_use') {
                if (block.name === 'web_search') status.innerHTML = '<span class="spinner"></span>正在搜索网络...';
                else if (block.name === 'web_fetch') status.innerHTML = '<span class="spinner"></span>正在获取页面...';
              } else if (block.type === 'text') {
                status.innerHTML = '<span class="spinner"></span>生成回答中...';
              } else if (block.type === 'server_tool_result' || block.type === 'web_search_tool_result') {
                for (const r of (block.content || block.results || [])) {
                  addCitation(citations, seen, r.url || r.link, r.title);
                }
              }
            }

            if (type === 'content_block_delta') {
              const delta = evt.delta || {};
              if (delta.type === 'text_delta') {
                resultText.textContent += delta.text || '';
              }
            }
          }
        }

        renderCitations(citations, citationList, citationsEl);
        status.textContent = `完成 · 模型: ${finalModel}`;

        const claudeResponseBox = document.getElementById('claudeResponseBox');
        document.getElementById('claudeResponseBody').textContent = JSON.stringify(allEvents, null, 2);
        claudeResponseBox.className = 'request-box visible';

      } catch (err) {
        showClaudeError(err.message);
        status.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }

    function showClaudeError(msg) {
      const box = document.getElementById('claudeErrorBox');
      box.textContent = msg;
      box.className = 'error-box visible';
    }

    async function doSearch() {
      const query = document.getElementById('query').value.trim();
      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('status');
      const errorBox = document.getElementById('errorBox');
      const resultBox = document.getElementById('resultBox');
      const requestBox = document.getElementById('requestBox');
      const resultText = document.getElementById('resultText');
      const citationsEl = document.getElementById('citations');
      const citationList = document.getElementById('citationList');

      if (!query) { showError('请输入搜索问题'); return; }

      const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const apiKey = document.getElementById('apiKey').value.trim();

      errorBox.className = 'error-box';
      resultBox.className = 'result-box';
      requestBox.className = 'request-box';
      resultText.textContent = '';
      citationsEl.style.display = 'none';
      citationList.innerHTML = '';

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span>连接中...';

      const body = {
        model: 'gpt-5-nano',
        tools: [{ type: 'web_search' }],
        stream: true,
        input: query
      };

      document.getElementById('requestBody').textContent = JSON.stringify(body, null, 2);
      requestBox.className = 'request-box visible';

      try {
        const res = await fetch(`${baseUrl}/v1/responses`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(apiKey ? { 'Authorization': `Bearer ${apiKey}` } : {})
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        resultBox.className = 'result-box visible';
        status.innerHTML = '<span class="spinner"></span>搜索中...';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalModel = 'gpt-5-nano';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') continue;

            let evt;
            try { evt = JSON.parse(raw); } catch { continue; }

            const type = evt.type || '';

            if (type === 'response.output_item.added') {
              const item = evt.item || {};
              if (item.type === 'web_search_call') {
                status.innerHTML = '<span class="spinner"></span>正在搜索网络...';
              } else if (item.type === 'message') {
                status.innerHTML = '<span class="spinner"></span>生成回答中...';
              }
            }

            if (type === 'response.output_text.delta') {
              resultText.textContent += evt.delta || '';
            }

            if (type === 'response.completed') {
              const resp = evt.response || {};
              finalModel = resp.model || finalModel;
              document.getElementById('responseBody').textContent = JSON.stringify(resp, null, 2);
              document.getElementById('responseBox').className = 'request-box visible';
              const citations = [];
              const seen = new Set();
              const queries = [];

              for (const item of (resp.output || [])) {
                if (item.type === 'web_search_call') {
                  const q = item.action?.query || (item.action?.queries || [])[0];
                  if (q) queries.push(q);
                }
                if (item.type === 'message') {
                  for (const c of (item.content || [])) {
                    if (c.type === 'output_text') {
                      for (const ann of (c.annotations || [])) {
                        if (ann.type === 'url_citation') {
                          addCitation(citations, seen, ann.url, ann.title || ann.url);
                        }
                      }
                    }
                  }
                }
              }

              if (citations.length > 0) {
                renderCitations(citations, citationList, citationsEl);
              } else if (queries.length > 0) {
                citationList.innerHTML = queries.map((q, i) => `
                  <div class="citation-item">
                    <span class="citation-num" style="background:#2a2a1e;color:#c8b86d">${i + 1}</span>
                    <div>
                      <span class="citation-title" style="color:#aaa">搜索词：${q}</span>
                    </div>
                  </div>
                `).join('');
                citationsEl.style.display = 'block';
              }
            }
          }
        }

        status.textContent = `完成 · 模型: ${finalModel}`;

      } catch (err) {
        showError(err.message);
        status.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.className = 'error-box visible';
    }

    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) doSearch();
    });
    document.getElementById('mcpQuery').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) doOpenAIMcpSearch();
    });
    document.getElementById('claudeQuery').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) doClaudeSearch();
    });
  </script>
